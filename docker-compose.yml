services:
  # ─────────────────────────────────────────────
  # Development: hot-reload con Angular CLI
  # Uso: docker compose up dev
  # ─────────────────────────────────────────────
  dev:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "4200:4200"
    command: sh -c "npm install && npx ng serve --host 0.0.0.0 --poll 2000"
    environment:
      - NODE_ENV=development
    profiles:
      - dev

  # ─────────────────────────────────────────────
  # Production: build multi-stage + Nginx
  # Uso: docker compose up app
  # ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-app
    ports:
      - "80:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    profiles:
      - prod

volumes:
  node_modules:
